# Raithani-Scan Configuration File
# ================================

# --- Target Settings ---
TIMEOUT=10
MAX_RETRIES=3
USER_AGENT="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36"

# --- Scan Levels ---
# 1 = Quick (skip slow scans)
# 2 = Standard (default, balanced)
# 3 = Exhaustive (all payloads, all tools)
SCAN_LEVEL=2

# --- Concurrency ---
MAX_PARALLEL_REQUESTS=5
REQUEST_DELAY_MIN=0.5
REQUEST_DELAY_MAX=2.0

# --- WAF Bypass ---
WAF_DETECTION_ENABLED=true
WAF_BYPASS_ENABLED=true
WAF_BYPASS_INTENSITY=medium   # low, medium, high
PROXY_LIST=""
USER_AGENT_ROTATION=true

# --- Port Scanning ---
PORT_SCAN_TYPE="sT"            # sT = TCP connect (no root), sS = SYN stealth (root), sV = version
PORT_RANGE="1-10000"
NMAP_TIMING="-T4"
NMAP_SCRIPTS="default,safe"

# --- Web Enumeration ---
DIR_LIST="payloads/dirs.txt"
EXTENSIONS="php,asp,aspx,jsp,html,txt,json,xml,bak,old"
GOBUSTER_THREADS=20

# --- Vulnerability Checks ---
SQLI_ENABLED=true
XSS_ENABLED=true
LFI_ENABLED=true
CMDI_ENABLED=true
SSTI_ENABLED=true
SSRF_ENABLED=true
XXE_ENABLED=true
OPEN_REDIRECT_ENABLED=true
HEADER_CHECK_ENABLED=true
CORS_CHECK_ENABLED=true
CSRF_ENABLED=true
IDOR_ENABLED=true
JWT_ENABLED=true
GRAPHQL_ENABLED=true

# --- API Fuzzing ---
API_FUZZ_ENABLED=true
API_DISCOVERY_DEPTH=2

# --- Tool Integration ---
SQLMAP_ENABLED=true
NIKTO_ENABLED=true
SEARCHSPLOIT_ENABLED=true
NMAP_VULN_SCRIPTS_ENABLED=true

# --- Reporting ---
REPORT_TERMINAL=true
REPORT_HTML=true
REPORT_JSON=true
REPORT_CSV=true

# --- Port Exploitation ---
PORT_EXPLOIT_ENABLED=false    # Enable via --exploit flag
EXPLOIT_BRUTE_FORCE=true      # Use hydra for quick brute-force
EXPLOIT_WORDLIST="/usr/share/wordlists/fasttrack.txt"
EXPLOIT_TIMEOUT=10            # Seconds per service test
EXPLOIT_PARALLEL=false        # Test multiple ports in parallel

# --- Bug Bounty Testing ---
BUG_BOUNTY_ENABLED=true
GOOGLE_DORK_ENABLED=true
DORK_MAX_RESULTS=30
SUBDOMAIN_TAKEOVER_ENABLED=true
SAST_DAST_ENABLED=true
CLOUD_BUCKET_ENUM_ENABLED=true
OAUTH_TESTING_ENABLED=true
ORIGIN_IP_DISCOVERY_ENABLED=true
SMUGGLING_ENABLED=true
RACE_CONDITION_ENABLED=true

# --- 2FA Bypass Testing ---
TWOFA_BYPASS_ENABLED=true      # 2FA bypass checks (run by default)
TWOFA_BYPASS_INTENSITY=medium  # low, medium, high
TWOFA_OTP_ATTEMPTS=10          # Number of OTP bypass attempts
TWOFA_RATE_LIMIT_CHECK=true    # Test rate limiting on 2FA endpoints

# --- Safety ---
DANGER_MODE=false             # Enables destructive payloads (DELETE, DROP, rm)
IGNORE_ROBOTS=false           # Ignore robots.txt restrictions
MAX_DISCOVERED_URLS=500       # Max URLs to crawl
